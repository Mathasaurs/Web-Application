<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathasaurs</title>
    <script>
        function playSound(isCorrect) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(isCorrect ? 600 : 200, audioContext.currentTime);
            oscillator.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function answerSelected(isCorrect) {
            playSound(isCorrect);
            // Additional logic for handling the answer
        }
    </script>
</head>
<body>
    <h1>Welcome to Mathasaurs!</h1>
    <button onclick="answerSelected(true)">Correct Answer</button>
    <button onclick="answerSelected(false)">Wrong Answer</button>
</body>
</html>
