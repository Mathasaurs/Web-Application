<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Math Quiz</title>
    <style>
        body {
            background: linear-gradient(to right, #7b1fa2, #c2185b);
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 36px; }
        .quiz-container { margin: 20px auto; padding: 20px; border: 2px solid white; border-radius: 10px; }
        .question { font-size: 24px; }
        .answers { margin: 20px 0; }
        .fact { margin: 15px 0; font-size: 18px; font-style: italic; color: #ffe082; min-height: 24px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .correct { background-color: green; }
        .wrong { background-color: red; }
        .progress { width: 100%; height: 20px; background: lightgray; border-radius: 5px; }
        .progress-bar { height: 100%; width: 0; background: #76c7c0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Dino Math Quiz</h1>
    <div class="quiz-container">
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="question"></div>
        <div class="answers"></div>
        <div class="fact"></div>
        <p>Score: <span id="score">0</span></p>
    </div>
    
    <script>
        const questions = [
            { question: 'What is 5 + 3?', answer: '8', fact: 'Dinosaurs lived 65 million years ago.' },
            { question: 'What is 12 - 4?', answer: '8', fact: 'Some dinosaurs were as large as a house.' },
            { question: 'What is 7 * 6?', answer: '42', fact: 'Tyrannosaurus Rex was the largest carnivore.' },
            { question: 'What is 20 / 4?', answer: '5', fact: 'Triceratops had three horns.' },
            { question: 'What is 8 + 2?', answer: '10', fact: 'Brachiosaurus was one of the tallest dinosaurs.' },
            { question: 'What is 15 - 5?', answer: '10', fact: 'Stegosaurus had plates on its back.' },
            { question: 'What is 9 + 10?', answer: '19', fact: 'Velociraptor was a small but fast dinosaur.' },
            { question: 'What is 3 * 7?', answer: '21', fact: 'Pterodactyls could fly.' },
            { question: 'What is 18 - 9?', answer: '9', fact: 'Some dinosaurs were herbivores.' },
            { question: 'What is 4 + 6?', answer: '10', fact: 'Dinosaurs are fascinating creatures!' }
        ];

        let score = 0;
        let questionIndex = 0;

        function loadQuestion() {
            if (questionIndex < questions.length) {
                const currentQuestion = questions[questionIndex];
                document.querySelector('.question').innerText = currentQuestion.question;
                const answersDiv = document.querySelector('.answers');
                answersDiv.innerHTML = '';
                [currentQuestion.answer, (currentQuestion.answer - 1), (parseInt(currentQuestion.answer) + 1)].forEach(answer => {
                    const button = document.createElement('button');
                    button.innerText = answer;
                    button.onclick = () => checkAnswer(answer);
                    answersDiv.appendChild(button);
                });
                document.querySelector('.progress-bar').style.width = ((questionIndex + 1) / questions.length * 100) + '%';
                // Clear fact area on new question
                document.querySelector('.fact').innerText = '';
            } else {
                endQuiz();
            }
        }

        function playSound(isCorrect) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (isCorrect) {
            // Correct sound - cheerful chord
            [523.25, 659.25, 783.99].forEach(freq => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            });
        } else {
            // Wrong sound - buzzer
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(300, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }
    } catch (e) {
        console.log('Audio context error:', e);
    }
}

        function checkAnswer(answer) {
            const currentFact = questions[questionIndex].fact;
            if (answer == questions[questionIndex].answer) {
                score += 1;
                playSound(true);
            } else {
                 playSound(false);
            }
            // Show the fact
            document.querySelector('.fact').innerText = currentFact;
            // Disable answer buttons to prevent multiple clicks
            Array.from(document.querySelectorAll('.answers button')).forEach(btn => btn.disabled = true);
            setTimeout(() => {
                questionIndex++;
                loadQuestion();
                document.getElementById('score').innerText = score;
            }, 1500); // Show the fact for 1.5 seconds
        }

        function endQuiz() {
            document.querySelector('.quiz-container').innerHTML = `<h2>Quiz Over!</h2><p>Your score: ${score}/${questions.length}</p>`;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
