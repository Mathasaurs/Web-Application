<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Math Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .dino-emoji {
            font-size: 4em;
            margin: 20px 0;
        }
        .intro-text {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }
        .question {
            color: #333;
            font-size: 1.3em;
            margin: 20px 0;
            font-weight: bold;
        }
        .dino-fact {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #555;
            font-style: italic;
            font-size: 0.95em;
            border-left: 4px solid #4caf50;
            min-height: 40px;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }
        .option:hover {
            border-color: #4caf50;
            transform: translateY(-2px);
        }
        .option:disabled {
            cursor: not-allowed;
        }
        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .start-btn, .restart-btn {
            padding: 15px 40px;
            font-size: 1.2em;
        }
        .score {
            font-size: 3em;
            color: #4caf50;
            margin: 20px 0;
            font-weight: bold;
        }
        .message {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="intro">
            <h1>🦕 DINO MATH QUIZ 🦕</h1>
            <div class="dino-emoji">🦖</div>
            <p class="intro-text">Test your math skills with our prehistoric math challenge!</p>
            <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
        </div>

        <div id="quiz" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p style="color: #666; margin-bottom: 20px;">Question <span id="questionNumber">1</span> of 10</p>
            <div class="dino-emoji" id="questionDino"></div>
            <p class="question" id="questionText"></p>
            <div class="dino-fact" id="factText"></div>
            <div class="options" id="optionsContainer"></div>
            <button onclick="nextQuestion()" id="nextBtn" disabled>Next Question</button>
        </div>

        <div id="results" style="display: none;">
            <h1>Quiz Complete! 🎉</h1>
            <div class="dino-emoji">🦕✨</div>
            <p class="score" id="scoreDisplay"></p>
            <p style="font-size: 1.3em; color: #666; margin-bottom: 20px;">out of 10 correct!</p>
            <div class="message" id="message"></div>
            <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "5 + 3?", o: ["8", "9", "7", "10"], c: 0, f: "🦕 T-Rex had a bite force of 12,800 PSI!", d: "🦖" },
            { q: "12 - 4?", o: ["7", "8", "9", "6"], c: 1, f: "🦖 Triceratops had 3 horns!", d: "🦕" },
            { q: "6 × 2?", o: ["10", "14", "12", "8"], c: 2, f: "🦕 Brachiosaurus reached 50 feet tall!", d: "🦖" },
            { q: "20 ÷ 4?", o: ["3", "5", "6", "4"], c: 1, f: "🦖 Velociraptors hunted in packs!", d: "🦕" },
            { q: "7 + 8?", o: ["14", "15", "16", "13"], c: 1, f: "🦕 Stegosaurus had 17 back plates!", d: "🦖" },
            { q: "25 - 10?", o: ["14", "16", "15", "12"], c: 2, f: "🦖 Ankylosaurus had armor plates!", d: "🦕" },
            { q: "9 × 3?", o: ["25", "27", "30", "24"], c: 1, f: "🦕 Parasaurolophus had a head crest!", d: "🦖" },
            { q: "36 ÷ 6?", o: ["5", "7", "6", "8"], c: 2, f: "🦖 Iguanodon was discovered first!", d: "🦕" },
            { q: "15 + 12?", o: ["26", "28", "27", "25"], c: 2, f: "🦕 Spinosaurus could swim!", d: "🦖" },
            { q: "100 ÷ 10?", o: ["8", "12", "10", "15"], c: 2, f: "🦖 Dinosaurs lived 160 million years!", d: "🦕" }
        ];

        let curr = 0, score = 0, answered = false;

        function playSound(correct) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (correct) {
                    [523.25, 659.25, 783.99].forEach(f => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.frequency.value = f;
                        o.connect(g);
                        g.connect(ctx.destination);
                        g.gain.setValueAtTime(0.3, ctx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        o.start();
                        o.stop(ctx.currentTime + 0.3);
                    });
                } else {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.frequency.setValueAtTime(300, ctx.currentTime);
                    o.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                    o.connect(g);
                    g.connect(ctx.destination);
                    g.gain.setValueAtTime(0.3, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    o.start();
                    o.stop(ctx.currentTime + 0.3);
                }
            } catch (e) { console.log(e); }
        }

        function startQuiz() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            show();
        }

        function show() {
            const q = questions[curr];
            document.getElementById('questionNumber').textContent = curr + 1;
            document.getElementById('questionDino').textContent = q.d;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('factText').textContent = '';
            
            const opts = document.getElementById('optionsContainer');
            opts.innerHTML = '';
            q.o.forEach((o, i) => {
                const d = document.createElement('div');
                d.className = 'option';
                d.textContent = o;
                d.onclick = () => ans(i);
                opts.appendChild(d);
            });

            document.getElementById('progressFill').style.width = ((curr + 1) / questions.length * 100) + '%';
            answered = false;
            document.getElementById('nextBtn').disabled = true;
        }

        function ans(i) {
            if (answered) return;
            answered = true;
            const q = questions[curr];
            const opts = document.querySelectorAll('.option');
            
            opts.forEach((o, idx) => {
                if (idx === q.c) o.classList.add('correct');
                else if (idx === i) o.classList.add('incorrect');
                o.style.pointerEvents = 'none';
            });

            document.getElementById('factText').textContent = q.f;

            if (i === q.c) {
                score++;
                playSound(true);
            } else {
                playSound(false);
            }

            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            curr++;
            if (curr < questions.length) show();
            else end();
        }

        function end() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('scoreDisplay').textContent = score;
            
            let msg = '';
            if (score === 10) msg = '🦖 PERFECT! Dino Math Master! 🦖';
            else if (score >= 8) msg = '🦕 Excellent! Dino Expert! 🦕';
            else if (score >= 6) msg = '🦖 Good Job! 🦖';
            else if (score >= 4) msg = '🦕 Keep Practicing! 🦕';
            else msg = '🦖 Try Again! 🦖';
            
            document.getElementById('message').textContent = msg;
        }

        function restartQuiz() {
            curr = 0;
            score = 0;
            answered = false;
            document.getElementById('results').style.display = 'none';
            document.getElementById('intro').style.display = 'block';
        }
    </script>
</body>
</html>
